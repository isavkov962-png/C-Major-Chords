<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Аккорды До мажора</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: 'Segoe UI', Arial, sans-serif;
      background: #f5f4ef;
      color: #1a1a18;
      min-height: 100vh;
      padding: 2rem 1rem;
    }

    .app {
      max-width: 720px;
      margin: 0 auto;
    }

    .header {
      text-align: center;
      margin-bottom: 2rem;
    }
    .header h1 {
      font-size: 24px;
      font-weight: 500;
      color: #1a1a18;
      margin-bottom: 6px;
    }
    .header p {
      font-size: 14px;
      color: #6b6b67;
    }

    .degrees-row {
      display: grid;
      grid-template-columns: repeat(7, 1fr);
      gap: 8px;
      margin-bottom: 1.5rem;
    }
    .degree-btn {
      background: #fff;
      border: 1px solid #ddddd6;
      border-radius: 10px;
      padding: 10px 4px;
      cursor: pointer;
      text-align: center;
      transition: all 0.15s;
    }
    .degree-btn:hover {
      border-color: #b0b0a8;
      background: #f0efe9;
    }
    .degree-btn.active {
      border: 2px solid #185FA5;
      background: #E6F1FB;
    }
    .degree-btn.active .degree-roman { color: #185FA5; }
    .degree-roman { font-size: 14px; font-weight: 500; color: #1a1a18; }
    .degree-note  { font-size: 11px; color: #6b6b67; margin-top: 2px; }
    .degree-quality {
      font-size: 10px;
      margin-top: 4px;
      padding: 2px 6px;
      border-radius: 10px;
      display: inline-block;
    }
    .q-major { background: #E6F1FB; color: #0C447C; }
    .q-minor { background: #EEEDFE; color: #3C3489; }
    .q-dim   { background: #FCEBEB; color: #791F1F; }

    .card-area {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 12px;
      margin-bottom: 16px;
    }
    .info-card {
      background: #fff;
      border: 1px solid #ddddd6;
      border-radius: 12px;
      padding: 1rem 1.25rem;
    }
    .card-label {
      font-size: 11px;
      color: #9b9b96;
      text-transform: uppercase;
      letter-spacing: 0.05em;
      margin-bottom: 6px;
    }
    .chord-name  { font-size: 26px; font-weight: 500; color: #1a1a18; }
    .chord-notes { font-size: 15px; color: #6b6b67; margin-top: 4px; }
    .chord-degree { font-size: 12px; color: #9b9b96; margin-top: 8px; }

    .interval-row {
      display: flex;
      justify-content: space-between;
      padding: 5px 0;
      border-bottom: 1px solid #efefeb;
      font-size: 13px;
    }
    .interval-row:last-child { border-bottom: none; }
    .int-label { color: #6b6b67; }
    .int-val   { font-weight: 500; color: #1a1a18; }
    .int-sym   { color: #9b9b96; font-weight: 400; }

    .keyboard-wrap { margin-bottom: 16px; }
    .keyboard {
      display: flex;
      gap: 3px;
      height: 84px;
    }
    .key {
      flex: 1;
      border-radius: 0 0 7px 7px;
      border: 1px solid #c8c8c0;
      background: #fff;
      display: flex;
      align-items: flex-end;
      justify-content: center;
      padding-bottom: 7px;
      font-size: 11px;
      color: #9b9b96;
      cursor: default;
      transition: background 0.18s;
    }
    .key.highlight-major { background: #B5D4F4; color: #042C53; border-color: #378ADD; font-weight: 600; }
    .key.highlight-minor { background: #CECBF6; color: #26215C; border-color: #7F77DD; font-weight: 600; }
    .key.highlight-dim   { background: #F7C1C1; color: #501313; border-color: #E24B4A; font-weight: 600; }
    .key.root            { box-shadow: 0 0 0 2px #185FA5 inset; }

    .tip-bar {
      background: #f0efe9;
      border-radius: 10px;
      padding: 12px 16px;
      font-size: 13px;
      color: #4a4a47;
      line-height: 1.6;
      margin-bottom: 14px;
    }
    .tip-bar strong { color: #1a1a18; font-weight: 500; }

    .play-btn {
      width: 100%;
      padding: 10px;
      font-size: 14px;
      cursor: pointer;
      background: #fff;
      border: 1px solid #c8c8c0;
      border-radius: 10px;
      color: #1a1a18;
      transition: background 0.15s;
    }
    .play-btn:hover  { background: #f0efe9; }
    .play-btn:active { transform: scale(0.98); }

    @media (max-width: 520px) {
      .degrees-row { gap: 4px; }
      .degree-roman { font-size: 12px; }
      .degree-note  { font-size: 9px; }
      .degree-quality { font-size: 9px; padding: 1px 4px; }
      .card-area { grid-template-columns: 1fr; }
    }
  </style>
</head>
<body>
<div class="app">
  <div class="header">
    <h1>Аккорды До мажора</h1>
    <p>Нажми на ступень, чтобы узнать об аккорде</p>
  </div>

  <div class="degrees-row" id="degreesRow"></div>
  <div class="card-area"   id="cardArea"></div>
  <div class="keyboard-wrap">
    <div class="keyboard" id="keyboard"></div>
  </div>
  <div class="tip-bar" id="tipBar"></div>
  <button class="play-btn" id="playBtn">▶ Прослушать аккорд</button>
</div>

<script>
  // Клавиатура: 0=До 1=Ре 2=Ми 3=Фа 4=Соль 5=Ля 6=Си 7=До 8=Ре 9=Ми 10=Фа
  const chords = [
    {
      roman: 'I', note: 'C', name: 'C', fullName: 'До мажор', quality: 'Мажор', qClass: 'q-major',
      notes: ['C4','E4','G4'], noteNames: 'До — Ми — Соль',
      intervals: ['1','3','5'], intervalNames: ['Прима','Большая терция','Квинта'],
      keyIdx: [0,2,4],
      tip: '<strong>I ступень — Тоника.</strong> Главный аккорд тональности. Ощущение покоя и завершённости. Мажорное трезвучие.'
    },
    {
      roman: 'II', note: 'Dm', name: 'Dm', fullName: 'Ре минор', quality: 'Минор', qClass: 'q-minor',
      notes: ['D4','F4','A4'], noteNames: 'Ре — Фа — Ля',
      intervals: ['1','♭3','5'], intervalNames: ['Прима','Малая терция','Квинта'],
      keyIdx: [1,3,5],
      tip: '<strong>II ступень — Субдоминантовая параллель.</strong> Мягкий, задумчивый характер. Минорное трезвучие.'
    },
    {
      roman: 'III', note: 'Em', name: 'Em', fullName: 'Ми минор', quality: 'Минор', qClass: 'q-minor',
      notes: ['E4','G4','B4'], noteNames: 'Ми — Соль — Си',
      intervals: ['1','♭3','5'], intervalNames: ['Прима','Малая терция','Квинта'],
      keyIdx: [2,4,6],
      tip: '<strong>III ступень — Медианта.</strong> Нейтральный, лирический характер. Минорное трезвучие.'
    },
    {
      roman: 'IV', note: 'F', name: 'F', fullName: 'Фа мажор', quality: 'Мажор', qClass: 'q-major',
      notes: ['F4','A4','C5'], noteNames: 'Фа — Ля — До',
      intervals: ['1','3','5'], intervalNames: ['Прима','Большая терция','Квинта'],
      keyIdx: [3,5,7],
      tip: '<strong>IV ступень — Субдоминанта.</strong> Торжественный, возвышенный характер. Мажорное трезвучие.'
    },
    {
      roman: 'V', note: 'G', name: 'G', fullName: 'Соль мажор', quality: 'Мажор', qClass: 'q-major',
      notes: ['G4','B4','D5'], noteNames: 'Соль — Си — Ре',
      intervals: ['1','3','5'], intervalNames: ['Прима','Большая терция','Квинта'],
      keyIdx: [4,6,8],
      tip: '<strong>V ступень — Доминанта.</strong> Напряжение, движение к тонике. Мажорное трезвучие. Важнейший аккорд после I.'
    },
    {
      roman: 'VI', note: 'Am', name: 'Am', fullName: 'Ля минор', quality: 'Минор', qClass: 'q-minor',
      notes: ['A4','C5','E5'], noteNames: 'Ля — До — Ми',
      intervals: ['1','♭3','5'], intervalNames: ['Прима','Малая терция','Квинта'],
      keyIdx: [5,7,9],
      tip: '<strong>VI ступень — Тоническая параллель.</strong> Параллельная минорная тональность (ля минор). Грустный, тёплый колорит.'
    },
    {
      roman: 'VII', note: 'B°', name: 'Bdim', fullName: 'Си уменьшённый', quality: 'Уменьш.', qClass: 'q-dim',
      notes: ['B4','D5','F5'], noteNames: 'Си — Ре — Фа',
      intervals: ['1','♭3','♭5'], intervalNames: ['Прима','Малая терция','Уменьш. квинта'],
      keyIdx: [6,8,10],
      tip: '<strong>VII ступень — Вводный тон.</strong> Неустойчивый, острый характер. Уменьшённое трезвучие (две малых терции).'
    }
  ];

  const allKeys = ['До','Ре','Ми','Фа','Соль','Ля','Си','До','Ре','Ми','Фа'];
  let selected = 0;
  let audioCtx = null;

  function renderDegrees() {
    document.getElementById('degreesRow').innerHTML = chords.map((c, i) => `
      <button class="degree-btn ${i === selected ? 'active' : ''}" onclick="select(${i})">
        <div class="degree-roman">${c.roman}</div>
        <div class="degree-note">${c.name}</div>
        <div class="degree-quality ${c.qClass}">${c.quality}</div>
      </button>
    `).join('');
  }

  function renderCard() {
    const c = chords[selected];
    const hClass = c.qClass === 'q-major' ? 'highlight-major'
                 : c.qClass === 'q-minor' ? 'highlight-minor' : 'highlight-dim';

    document.getElementById('cardArea').innerHTML = `
      <div class="info-card">
        <div class="card-label">Аккорд</div>
        <div class="chord-name">${c.fullName}</div>
        <div class="chord-notes">${c.noteNames}</div>
        <div class="chord-degree">Ступень ${c.roman} — ${c.quality}</div>
      </div>
      <div class="info-card">
        <div class="card-label">Структура</div>
        ${c.intervals.map((iv, i) => `
          <div class="interval-row">
            <span class="int-label">${c.intervalNames[i]}</span>
            <span class="int-val">${c.noteNames.split(' — ')[i]} <span class="int-sym">(${iv})</span></span>
          </div>
        `).join('')}
      </div>
    `;

    document.getElementById('keyboard').innerHTML = allKeys.map((k, i) => `
      <div class="key ${c.keyIdx.includes(i) ? hClass : ''} ${i === c.keyIdx[0] ? 'root' : ''}">${k}</div>
    `).join('');

    document.getElementById('tipBar').innerHTML = c.tip;
  }

  function select(i) {
    selected = i;
    renderDegrees();
    renderCard();
  }

  function playChord() {
    if (!audioCtx) audioCtx = new (window.AudioContext || window.webkitAudioContext)();
    const c = chords[selected];
    const freq = {
      'C4': 261.63, 'D4': 293.66, 'E4': 329.63, 'F4': 349.23,
      'G4': 392.00, 'A4': 440.00, 'B4': 493.88,
      'C5': 523.25, 'D5': 587.33, 'E5': 659.25, 'F5': 698.46
    };
    c.notes.forEach((n, i) => {
      const osc  = audioCtx.createOscillator();
      const gain = audioCtx.createGain();
      osc.connect(gain);
      gain.connect(audioCtx.destination);
      osc.type = 'triangle';
      osc.frequency.value = freq[n] || 440;
      const t = audioCtx.currentTime + i * 0.08;
      gain.gain.setValueAtTime(0, t);
      gain.gain.linearRampToValueAtTime(0.18, t + 0.05);
      gain.gain.exponentialRampToValueAtTime(0.001, t + 1.5);
      osc.start(t);
      osc.stop(t + 1.6);
    });
  }

  document.getElementById('playBtn').addEventListener('click', playChord);

  renderDegrees();
  renderCard();
</script>
</body>
</html>
